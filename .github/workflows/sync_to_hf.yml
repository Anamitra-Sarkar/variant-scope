name: Sync Backend to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Hugging Face Hub
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade huggingface_hub

      - name: Push backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        shell: python
        run: |
          from huggingface_hub import HfApi
          import os

          api = HfApi()
          token = os.environ["HF_TOKEN"]

          repo_id = os.environ.get("HF_SPACE_ID", "Arko006/variantscope-backend")

          print(f"Syncing backend to HF Space: {repo_id}")

          api.upload_folder(
              folder_path="backend",
              repo_id=repo_id,
              repo_type="space",
              token=token,
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  ".venv/*",
                  "node_modules/*",
                  "__pycache__/*",
                  "*.log",
                  ".env",
                  "firebase-key.json"
              ],
          )

          print("Upload complete! Hugging Face Space will now rebuild.")
