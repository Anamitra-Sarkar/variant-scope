name: Sync Backend to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          git config --global user.email "bot@variantscope.app"
          git config --global user.name "VariantScope Sync Bot"

          HF_USERNAME=$(echo "$HF_SPACE" | cut -d'/' -f1)
          git clone --depth 1 "https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE" hf_space

          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='firebase-key.json' \
            --exclude='*.log' \
            --exclude='__pycache__/' \
            --exclude='.cache/' \
            --exclude='.vercel/' \
            backend/ hf_space/

          cat > hf_space/README.md << 'READMEEOF'
---
title: VariantScope Backend
emoji: 🧬
colorFrom: blue
colorTo: indigo
sdk: docker
app_port: 7860
pinned: false
license: apache-2.0
---
READMEEOF

          cd hf_space
          git add -A
          if git diff-index --quiet HEAD --; then
            echo "No changes to sync."
          else
            git commit -m "sync: auto-update backend from GitHub"
            git push origin main
          fi
